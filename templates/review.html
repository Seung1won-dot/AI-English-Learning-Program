<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>복습 — English World</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>
  <header class="topbar">
    <h1>🌏 English World</h1>
    <nav>
      <a href="/">홈</a>
      <a href="/toeic">TOEIC</a>
      <a href="/opic">OPIC</a>
      <a href="/talk">회화</a>
      <a href="/history">기록</a>
      <a href="/review" class="active">복습</a>
      <a href="/quiz">퀴즈</a>
    </nav>
  </header>

  <main class="container">
    <section class="card">
      <h2>🃏 플래시카드 복습</h2>
      <p class="hint">한글 뜻을 보고 영어를 떠올린 뒤, 카드를 눌러 정답을 확인하세요.</p>

      <div class="review-tabs">
        <button class="tab active" data-kind="words">단어</button>
        <button class="tab" data-kind="sentences">문장</button>
      </div>

      <div id="reviewArea">
        <div id="emptyMsg" class="hint hidden">아직 복습할 항목이 없습니다. <a href="/">학습하러 가기 →</a></div>

        <div id="card" class="flashcard hidden">
          <div class="flashcard-inner">
            <div class="flash-front" id="flashFront"></div>
            <div class="flash-back hidden" id="flashBack">
              <div class="flash-answer">
                <span id="flashAnswer"></span>
                <button class="speak-btn" id="flashSpeak" data-text="" title="발음 듣기">🔊</button>
              </div>
              <div class="flash-extra" id="flashExtra"></div>
            </div>
          </div>
          <p class="flash-tip" id="flashTip">카드를 클릭하면 정답이 보여요</p>
        </div>

        <div id="controls" class="review-controls hidden">
          <button id="prevBtn" class="ghost">← 이전</button>
          <span id="progress" class="review-progress">1 / 1</span>
          <button id="nextBtn">다음 →</button>
        </div>
      </div>
    </section>
  </main>

  <script src="{{ url_for('static', filename='tts.js') }}"></script>
  <script src="{{ url_for('static', filename='review.js') }}"></script>
</body>
</html>
