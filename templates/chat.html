<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI 회화 — English World</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>
  <header class="topbar">
    <h1>🌏 English World</h1>
    <nav>
      <a href="/">오늘 학습</a>
      <a href="/history">학습 기록</a>
      <a href="/review">복습</a>
      <a href="/quiz">퀴즈</a>
      <a href="/chat" class="active">회화</a>
    </nav>
  </header>

  <main class="container">
    <section class="card">
      <h2>🗣️ AI 회화 연습</h2>
      <p class="hint">AI와 영어로 대화하세요. 답변에 실수가 있으면 📝 로 한국어 교정을 덧붙여 줍니다.</p>

      {% if not using_real_ai %}
        <p class="mode-badge">🧩 목업 모드 — .env 에 GROQ_API_KEY(무료) 를 넣으면 진짜 대화가 됩니다</p>
      {% endif %}

      <div class="chat-topics">
        <span>주제:</span>
        <button class="topic-chip active" data-topic="">자유</button>
        <button class="topic-chip" data-topic="ordering food at a cafe">카페 주문</button>
        <button class="topic-chip" data-topic="traveling and asking directions">여행/길찾기</button>
        <button class="topic-chip" data-topic="a job interview">면접</button>
        <button class="topic-chip" data-topic="small talk about hobbies">취미 잡담</button>
      </div>

      <div id="chatLog" class="chat-log"></div>

      <form id="chatForm" class="chat-form" autocomplete="off">
        <input type="text" id="chatInput" placeholder="영어로 입력하고 Enter…" autocomplete="off" />
        <button type="submit" id="chatSend">보내기</button>
      </form>
      <p id="chatError" class="error hidden"></p>
    </section>
  </main>

  <script src="{{ url_for('static', filename='tts.js') }}"></script>
  <script src="{{ url_for('static', filename='chat.js') }}"></script>
</body>
</html>
